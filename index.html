<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Secure Firebase Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:
    radial-gradient(circle at top left,#6a11cb,#2575fc);
    position:relative;
}

/* Animated Background */

body::before,
body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    filter:blur(80px);
    opacity:0.5;
    animation:float 8s infinite ease-in-out alternate;
}

body::before{
    background:#00d2ff;
    top:-150px;
    left:-150px;
}

body::after{
    background:#ff00cc;
    bottom:-150px;
    right:-150px;
}

@keyframes float{
    from{
        transform:translateY(0px) translateX(0px);
    }
    to{
        transform:translateY(40px) translateX(20px);
    }
}

/* Login Card */

.card{
    width:90%;
    max-width:430px;
    padding:40px 35px;
    border-radius:28px;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:
    0 8px 32px rgba(0,0,0,0.25);

    position:relative;
    z-index:10;

    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0px);
    }
}

.logo{
    width:85px;
    height:85px;
    margin:auto;
    margin-bottom:20px;

    border-radius:50%;

    background:linear-gradient(135deg,#00c6ff,#0072ff);

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:38px;
    color:white;

    box-shadow:
    0 10px 30px rgba(0,114,255,0.5);
}

h1{
    color:white;
    text-align:center;
    font-size:30px;
    margin-bottom:8px;
    font-weight:700;
}

.subtitle{
    text-align:center;
    color:rgba(255,255,255,0.75);
    margin-bottom:35px;
    font-size:14px;
}

/* Inputs */

.input-group{
    margin-bottom:22px;
}

label{
    display:block;
    color:white;
    margin-bottom:10px;
    font-size:14px;
    font-weight:500;
}

.input-box{
    position:relative;
}

input{
    width:100%;
    padding:16px 18px;
    border:none;
    outline:none;

    border-radius:14px;

    background:rgba(255,255,255,0.12);

    color:white;
    font-size:15px;

    border:1px solid rgba(255,255,255,0.18);

    transition:0.3s;
}

input::placeholder{
    color:rgba(255,255,255,0.55);
}

input:focus{
    border-color:#00d2ff;
    box-shadow:
    0 0 20px rgba(0,210,255,0.35);
}

/* Button */

button{
    width:100%;
    padding:16px;

    border:none;
    border-radius:14px;

    background:
    linear-gradient(135deg,#00d2ff,#0072ff);

    color:white;
    font-size:16px;
    font-weight:600;

    cursor:pointer;
    transition:0.35s;

    box-shadow:
    0 8px 25px rgba(0,114,255,0.4);
}

button:hover{
    transform:translateY(-2px) scale(1.01);

    box-shadow:
    0 15px 35px rgba(0,114,255,0.55);
}

button:active{
    transform:scale(0.98);
}

/* Result */

#result{
    margin-top:22px;
    padding:16px;
    border-radius:14px;

    text-align:center;
    font-weight:600;
    display:none;

    animation:pop 0.4s ease;
}

@keyframes pop{
    from{
        transform:scale(0.8);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.success{
    background:rgba(46,204,113,0.18);
    border:1px solid rgba(46,204,113,0.45);
    color:#b7ffce;
}

.error{
    background:rgba(255,0,85,0.14);
    border:1px solid rgba(255,0,85,0.4);
    color:#ffd2df;
}

/* Footer */

.footer{
    text-align:center;
    margin-top:25px;
    color:rgba(255,255,255,0.6);
    font-size:12px;
}

/* Responsive */

@media(max-width:500px){

    .card{
        padding:35px 25px;
    }

    h1{
        font-size:26px;
    }

    .logo{
        width:75px;
        height:75px;
        font-size:32px;
    }

}

</style>
</head>

<body>

<div class="card">

    <div class="logo">
        🔒
    </div>

    <h1>Secure Login</h1>

    <div class="subtitle">
        Firebase Protected Authentication
    </div>

    <div class="input-group">

        <label>
            Enter Password
        </label>

        <div class="input-box">

            <input
                type="password"
                id="passwordInput"
                placeholder="Enter your secure password"
            >

        </div>

    </div>

    <button onclick="login()">
        Access Dashboard
    </button>

    <div id="result"></div>

    <div class="footer">
        Protected by Firebase Security
    </div>

</div>

<script>

// Firebase URL
const FIREBASE_URL =
"https://c-ph3r-default-rtdb.firebaseio.com/user.json";

// Redirect page
const REDIRECT_URL =
"index1.html";

// Login Function
async function login(){

    const enteredPassword =
        document.getElementById("passwordInput").value;

    const result =
        document.getElementById("result");

    result.style.display = "block";

    // Empty check
    if(!enteredPassword){

        result.className = "error";

        result.innerHTML =
            "❌ Please enter password";

        return;
    }

    try{

        // Fetch Firebase data
        const response =
            await fetch(FIREBASE_URL);

        const data =
            await response.json();

        console.log(data);

        // Get first Firebase key
        const firstKey =
            Object.keys(data)[0];

        // Firebase password
        const firebasePassword =
            data[firstKey].password;

        // Compare
        if(enteredPassword === firebasePassword){

            result.className = "success";

            result.innerHTML =
                "✅ Login Successful! Redirecting...";

            // Redirect
            setTimeout(()=>{

                window.location.href =
                    REDIRECT_URL;

            },1500);

        }else{

            result.className = "error";

            result.innerHTML =
                "❌ Incorrect Password";
        }

    }catch(error){

        console.log(error);

        result.className = "error";

        result.innerHTML =
            "⚠️ Firebase Connection Failed";
    }
}

</script>

</body>
</html>
