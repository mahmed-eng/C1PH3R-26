<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Secure Firebase Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top left,#6a11cb,#2575fc);

    overflow:hidden;
    position:relative;
}

/* Glow background */
body::before,
body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    filter:blur(100px);
    opacity:0.4;
    animation:float 8s infinite alternate ease-in-out;
}

body::before{
    background:#00d2ff;
    top:-150px;
    left:-150px;
}

body::after{
    background:#ff00cc;
    bottom:-150px;
    right:-150px;
}

@keyframes float{
    from{ transform:translate(0,0); }
    to{ transform:translate(40px,40px); }
}

/* Card */
.card{
    width:90%;
    max-width:420px;
    padding:45px 32px;

    border-radius:28px;

    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:0 10px 40px rgba(0,0,0,0.25);

    text-align:center;
    color:white;

    position:relative;
    z-index:10;
}

/* Icon */
.logo{
    font-size:44px;
    margin-bottom:12px;
}

/* Title */
h1{
    font-size:30px;
    margin-bottom:6px;
}

/* Subtitle */
.subtitle{
    font-size:13px;
    opacity:0.75;
    margin-bottom:25px;
}

/* Input */
input{
    width:100%;
    padding:15px;

    margin-top:10px;

    border-radius:14px;
    border:none;
    outline:none;

    background:rgba(255,255,255,0.12);
    color:white;

    border:1px solid rgba(255,255,255,0.2);

    font-size:15px;

    transition:0.3s;
}

input::placeholder{
    color:rgba(255,255,255,0.6);
}

input:focus{
    border-color:#00d2ff;
    box-shadow:0 0 18px rgba(0,210,255,0.35);
}

/* Button */
button{
    width:100%;
    padding:15px;

    margin-top:22px;

    border:none;
    border-radius:14px;

    background:linear-gradient(135deg,#00d2ff,#0072ff);

    color:white;
    font-weight:600;
    font-size:15px;

    cursor:pointer;

    transition:0.35s;

    box-shadow:0 8px 25px rgba(0,0,0,0.25);
}

button:hover{
    transform:translateY(-2px) scale(1.02);
}

/* Result */
#result{
    margin-top:16px;
    font-size:14px;
    display:none;
}

.success{ color:#7CFFB2; }
.error{ color:#ff6b81; }

</style>
</head>

<body>

<div class="card">

    <div class="logo">🔒</div>

    <h1>Secure Login</h1>

    <div class="subtitle">
        Firebase Protected Vault Access
    </div>

    <input type="password" id="passwordInput" placeholder="Enter password">

    <button onclick="login()">Login</button>

    <div id="result"></div>

</div>

<script>

/* 🔥 Firebase URL */
const FIREBASE_URL =
"https://c-ph3r-default-rtdb.firebaseio.com/user.json";

/* 📌 Vault redirect page */
const REDIRECT_URL = "index1.html";

/* 🔐 LOGIN FUNCTION (UNCHANGED LOGIC) */
async function login(){

    const enteredPassword =
        document.getElementById("passwordInput").value;

    const result =
        document.getElementById("result");

    result.style.display = "block";

    if(!enteredPassword){
        result.className = "error";
        result.innerHTML = "❌ Please enter password";
        return;
    }

    try{

        const response = await fetch(FIREBASE_URL);
        const data = await response.json();

        if(!data){
            result.className = "error";
            result.innerHTML = "⚠️ No user found in Firebase";
            return;
        }

        const firstKey = Object.keys(data)[0];
        const firebasePassword = data[firstKey].password;

        if(enteredPassword === firebasePassword){

            /* ✅ CREATE LOGIN SESSION */
            sessionStorage.setItem("auth","true");

            result.className = "success";
            result.innerHTML = "✅ Login successful...";

            setTimeout(()=>{
                window.location.href = REDIRECT_URL;
            },1200);

        }else{
            result.className = "error";
            result.innerHTML = "❌ Wrong password";
        }

    }catch(err){
        console.log(err);
        result.className = "error";
        result.innerHTML = "⚠️ Firebase connection failed";
    }
}

</script>

</body>
</html>
