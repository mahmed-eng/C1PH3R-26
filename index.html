<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Password Cipher Tool</title>

<style>
    * {
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #333;
    }

    .container {
        background: #fff;
        width: 90%;
        max-width: 700px;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    h1 {
        text-align: center;
        color: #1e3c72;
        margin-bottom: 25px;
    }

    .section {
        margin-bottom: 25px;
        padding: 20px;
        border: 1px solid #e0e0e0;
        border-radius: 12px;
        background: #f9f9f9;
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
    }

    input[type="password"],
    input[type="text"],
    textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 14px;
        margin-bottom: 12px;
    }

    textarea {
        min-height: 120px;
        resize: vertical;
        font-family: Consolas, monospace;
    }

    .btn-group {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    button {
        background: #1e3c72;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        transition: 0.3s;
    }

    button:hover {
        background: #16305c;
    }

    .secondary {
        background: #28a745;
    }

    .secondary:hover {
        background: #1f7d35;
    }

    .danger {
        background: #dc3545;
    }

    .danger:hover {
        background: #b52a37;
    }

    .info {
        background: #17a2b8;
    }

    .info:hover {
        background: #117a8b;
    }

    .output {
        background: #eef5ff;
        border: 1px solid #c9ddff;
    }

    .note {
        font-size: 13px;
        color: #666;
        margin-top: 8px;
    }

    .success {
        color: green;
        font-weight: bold;
        margin-top: 10px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>🔐 Password Cipher Tool</h1>

    <!-- Encrypt Section -->
    <div class="section">
        <h2>Encrypt Password</h2>

        <label for="passwordInput">Enter Password</label>
        <input type="password" id="passwordInput" placeholder="Enter password to encrypt" />

        <div class="btn-group">
            <button onclick="encryptPassword()">Encrypt</button>
            <button class="secondary" onclick="downloadEncrypted()">Export to TXT</button>
            <button class="danger" onclick="clearAll()">Clear</button>
        </div>

        <label for="encryptedOutput" style="margin-top:15px;">Encrypted Output</label>
        <textarea id="encryptedOutput" class="output" readonly></textarea>
        <div class="note">
            Encryption uses AES-GCM with PBKDF2 key derivation and a user-provided password.
        </div>
    </div>

    <!-- Decrypt Section -->
    <div class="section">
        <h2>Import and Decrypt</h2>

        <label for="fileInput">Import Encrypted TXT File</label>
        <input type="file" id="fileInput" accept=".txt" />

        <label for="masterKeyInput">Enter Master Key</label>
        <input type="password" id="masterKeyInput" placeholder="Enter the same key used for encryption" />

        <div class="btn-group">
            <button class="info" onclick="decryptImported()">Decrypt</button>
        </div>

        <label for="decryptedOutput" style="margin-top:15px;">Decrypted Password</label>
        <input type="text" id="decryptedOutput" readonly />
    </div>
</div>

<script>
let encryptedText = "";

/*
  File format (JSON):
  {
    "salt": "...base64...",
    "iv": "...base64...",
    "data": "...base64..."
  }

  The user enters:
  - Password to protect
  - Master Key (prompted during encryption)

  The same Master Key is required for decryption.
*/

// ---------- Utility Functions ----------
function arrayBufferToBase64(buffer) {
    const bytes = new Uint8Array(buffer);
    let binary = "";
    for (let i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
    }
    return btoa(binary);
}

function base64ToArrayBuffer(base64) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
    }
    return bytes.buffer;
}

async function deriveKey(masterKey, salt) {
    const encoder = new TextEncoder();

    const keyMaterial = await crypto.subtle.importKey(
        "raw",
        encoder.encode(masterKey),
        "PBKDF2",
        false,
        ["deriveKey"]
    );

    return crypto.subtle.deriveKey(
        {
            name: "PBKDF2",
            salt: salt,
            iterations: 100000,
            hash: "SHA-256"
        },
        keyMaterial,
        {
            name: "AES-GCM",
            length: 256
        },
        false,
        ["encrypt", "decrypt"]
    );
}

// ---------- Encrypt ----------
async function encryptPassword() {
    const password = document.getElementById("passwordInput").value;

    if (!password) {
        alert("Please enter a password to encrypt.");
        return;
    }

    const masterKey = prompt("Enter a master key to protect this password:");

    if (!masterKey) {
        alert("Master key is required.");
        return;
    }

    try {
        const encoder = new TextEncoder();

        const salt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));

        const key = await deriveKey(masterKey, salt);

        const encrypted = await crypto.subtle.encrypt(
            {
                name: "AES-GCM",
                iv: iv
            },
            key,
            encoder.encode(password)
        );

        const payload = {
            salt: arrayBufferToBase64(salt),
            iv: arrayBufferToBase64(iv),
            data: arrayBufferToBase64(encrypted)
        };

        encryptedText = JSON.stringify(payload, null, 2);

        document.getElementById("encryptedOutput").value = encryptedText;
    } catch (error) {
        alert("Encryption failed: " + error.message);
    }
}

// ---------- Download TXT ----------
function downloadEncrypted() {
    if (!encryptedText) {
        alert("Please encrypt a password first.");
        return;
    }

    const blob = new Blob([encryptedText], { type: "text/plain" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "encrypted_password.txt";
    a.click();

    URL.revokeObjectURL(url);
}

// ---------- Read File ----------
function readFileAsText(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = () => reject(new Error("Failed to read file."));
        reader.readAsText(file);
    });
}

// ---------- Decrypt ----------
async function decryptImported() {
    const fileInput = document.getElementById("fileInput");
    const masterKey = document.getElementById("masterKeyInput").value;

    if (!fileInput.files.length) {
        alert("Please select a TXT file.");
        return;
    }

    if (!masterKey) {
        alert("Please enter the master key.");
        return;
    }

    try {
        const fileContent = await readFileAsText(fileInput.files[0]);
        const payload = JSON.parse(fileContent);

        const salt = new Uint8Array(base64ToArrayBuffer(payload.salt));
        const iv = new Uint8Array(base64ToArrayBuffer(payload.iv));
        const encryptedData = base64ToArrayBuffer(payload.data);

        const key = await deriveKey(masterKey, salt);

        const decrypted = await crypto.subtle.decrypt(
            {
                name: "AES-GCM",
                iv: iv
            },
            key,
            encryptedData
        );

        const decoder = new TextDecoder();
        const originalPassword = decoder.decode(decrypted);

        document.getElementById("decryptedOutput").value = originalPassword;
    } catch (error) {
        alert("Decryption failed. Check that the file and master key are correct.");
    }
}

// ---------- Clear ----------
function clearAll() {
    document.getElementById("passwordInput").value = "";
    document.getElementById("encryptedOutput").value = "";
    document.getElementById("fileInput").value = "";
    document.getElementById("masterKeyInput").value = "";
    document.getElementById("decryptedOutput").value = "";
    encryptedText = "";
}
</script>

</body>
</html>
