<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Firebase Password Vault</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    background: radial-gradient(circle at top left,#6a11cb,#2575fc);
    position:relative;
}

/* glow */
body::before,body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    filter:blur(100px);
    opacity:0.45;
}

body::before{
    background:#00d2ff;
    top:-150px;
    left:-150px;
}

body::after{
    background:#ff00cc;
    bottom:-150px;
    right:-150px;
}

.container{
    width:100%;
    max-width:900px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(18px);
    border-radius:30px;
    padding:35px;
    border:1px solid rgba(255,255,255,0.2);
}

h1{
    text-align:center;
    color:white;
    margin-bottom:20px;
}

.section{
    background:rgba(255,255,255,0.08);
    border-radius:24px;
    padding:25px;
    margin-bottom:20px;
}

label{
    color:white;
    font-size:14px;
    display:block;
    margin-bottom:8px;
}

input,textarea{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.2);
    background:rgba(255,255,255,0.12);
    color:white;
    outline:none;
}

input::placeholder,
textarea::placeholder{
    color:white;
    opacity:0.85;
}

.btn-group{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

button{
    flex:1;
    min-width:140px;
    padding:14px;
    border:none;
    border-radius:12px;
    color:white;
    font-weight:600;
    cursor:pointer;
}

.primary{background:linear-gradient(135deg,#00d2ff,#0072ff);}
.danger{background:linear-gradient(135deg,#ff416c,#ff4b2b);}
.info{background:linear-gradient(135deg,#17a2b8,#007bff);}

/* STATUS MESSAGE */
#status{
    text-align:center;
    color:white;
    margin-bottom:15px;
    font-size:14px;
    min-height:20px;
    opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

<h1>🔐 Software Password Vault</h1>

<div id="status"></div>

<!-- SAVE -->
<div class="section">

<h2 style="color:white;">Save Password</h2>

<label>Software Name</label>
<input id="softwareName" placeholder="Enter software name (e.g. SQL, Gmail)">

<label>Password</label>
<input id="password" type="password" placeholder="Enter password">

<label>Master Key</label>
<input id="masterKey" type="password" placeholder="Enter master key">

<div class="btn-group">
<button class="primary" onclick="saveEncrypted()">Encrypt & Save</button>
<button class="danger" onclick="clearAll()">Clear</button>
</div>

</div>

<!-- LOAD -->
<div class="section">

<h2 style="color:white;">Load Password</h2>

<label>Software Name</label>
<input id="searchSoftware" placeholder="Enter software name">

<label>Master Key</label>
<input id="decryptKey" type="password" placeholder="Enter master key">

<div class="btn-group">
<button class="info" onclick="loadAndDecrypt()">Decrypt</button>
</div>

<label style="color:white;">Result</label>
<textarea id="result" readonly></textarea>

</div>

</div>

<script>

/* refresh logout */
if (performance.getEntriesByType("navigation")[0]?.type === "reload") {
    sessionStorage.removeItem("auth");
    window.location.href = "index.html";
}

/* auth */
if(sessionStorage.getItem("auth") !== "true"){
    window.location.href = "index.html";
}

/* firebase */
const FIREBASE_URL =
"https://c-ph3r-default-rtdb.firebaseio.com/users.json";

/* status helper */
function setStatus(msg){
    document.getElementById("status").innerText = msg;
}

/* helpers */
function arrayBufferToBase64(buffer){
    return btoa(String.fromCharCode(...new Uint8Array(buffer)));
}

function base64ToArrayBuffer(base64){
    return Uint8Array.from(atob(base64), c => c.charCodeAt(0)).buffer;
}

async function deriveKey(masterKey,salt){
    const keyMaterial = await crypto.subtle.importKey(
        "raw",
        new TextEncoder().encode(masterKey),
        "PBKDF2",
        false,
        ["deriveKey"]
    );

    return crypto.subtle.deriveKey(
        {
            name:"PBKDF2",
            salt,
            iterations:100000,
            hash:"SHA-256"
        },
        keyMaterial,
        { name:"AES-GCM", length:256 },
        false,
        ["encrypt","decrypt"]
    );
}

/* SAVE */
async function saveEncrypted(){

    let softwareName = document.getElementById("softwareName").value.trim();
    const password = document.getElementById("password").value;
    const masterKey = document.getElementById("masterKey").value;

    if(!softwareName || !password || !masterKey){
        setStatus("⚠️ Please fill all fields");
        return;
    }

    softwareName = softwareName.toLowerCase();

    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));

    const key = await deriveKey(masterKey,salt);

    const encrypted = await crypto.subtle.encrypt(
        { name:"AES-GCM", iv },
        key,
        new TextEncoder().encode(password)
    );

    await fetch(FIREBASE_URL,{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({
            softwareName,
            salt: arrayBufferToBase64(salt),
            iv: arrayBufferToBase64(iv),
            data: arrayBufferToBase64(encrypted)
        })
    });

    setStatus("✅ Password saved successfully");

    clearAll();
}

/* LOAD */
async function loadAndDecrypt(){

    let searchSoftware = document.getElementById("searchSoftware").value.trim();
    const masterKey = document.getElementById("decryptKey").value;

    if(!searchSoftware || !masterKey){
        setStatus("⚠️ Please fill all fields");
        return;
    }

    searchSoftware = searchSoftware.toLowerCase();

    const res = await fetch(FIREBASE_URL);
    const data = await res.json();

    let found = null;

    for(const key in data){
        if(data[key].softwareName === searchSoftware){
            found = data[key];
            break;
        }
    }

    if(!found){
        setStatus("❌ Software not found");
        return;
    }

    const salt = new Uint8Array(base64ToArrayBuffer(found.salt));
    const iv = new Uint8Array(base64ToArrayBuffer(found.iv));

    const key = await deriveKey(masterKey,salt);

    const decrypted = await crypto.subtle.decrypt(
        { name:"AES-GCM", iv },
        key,
        base64ToArrayBuffer(found.data)
    );

    document.getElementById("result").value =
        new TextDecoder().decode(decrypted);

    setStatus("🔓 Password decrypted successfully");
}

/* CLEAR */
function clearAll(){
    document.getElementById("softwareName").value = "";
    document.getElementById("password").value = "";
    document.getElementById("masterKey").value = "";
    document.getElementById("searchSoftware").value = "";
    document.getElementById("decryptKey").value = "";
    document.getElementById("result").value = "";
}

</script>

</body>
</html>
